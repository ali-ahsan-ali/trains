query TripPlanner (
  $fromPlace: String
  $toPlace: String
  $numItineraries: Int
  $searchWindow: Long
) {
  plan(
    numItineraries: $numItineraries
    searchWindow: $searchWindow
    fromPlace: $fromPlace
    toPlace: $toPlace
  ) {
    from {
      name
    }
    to {
      name
    }
    itineraries {
      startTime
      endTime
      duration
      legs{
        transitLeg
        serviceDate
        trip{
          stoptimes {
            realtimeArrival
            realtimeDeparture
            stop {
              id
            }
          }
        }
        intermediateStops{
          name
          id
        }
        startTime
        endTime
        duration
        from {
          stop{
            id
            name
            parentStation{
              id
            }
          }
          name
        }
        to {
          stop{
            id
            name
            parentStation{
              id
            }
          }
          name
        }
        mode
        interlineWithPreviousLeg
      }
    }
    routingErrors {
      code
      inputField
      description
    }
    debugOutput {
      totalTime
      timedOut
    }
  }
}
